treename: null
branch_magic: null
file_magic: null
selection: event_n_tracks > 0
test_time_selection: null
preprocess:
  method: auto
  data_fraction: 0.5
  params:
    track_eta_raw:
      length: 2100
      pad_mode: constant
      center: null
      scale: 1
      min: -5
      max: 5
      pad_value: 0
    track_phi_raw:
      length: 2100
      pad_mode: constant
      center: null
      scale: 1
      min: -5
      max: 5
      pad_value: 0
    track_px:
      length: 2100
      pad_mode: constant
      center: -0.006469251122325659
      scale: 1.4233942106180126
      min: -5
      max: 5
      pad_value: 0
    track_py:
      length: 2100
      pad_mode: constant
      center: 0.0029115439392626286
      scale: 1.438039106844179
      min: -5
      max: 5
      pad_value: 0
    track_pz:
      length: 2100
      pad_mode: constant
      center: 0.010558634996414185
      scale: 0.36399709574107947
      min: -5
      max: 5
      pad_value: 0
    track_eta:
      length: 2100
      pad_mode: constant
      center: 0.01318359375
      scale: 0.5305012304105686
      min: -5
      max: 5
      pad_value: 0
    track_phi:
      length: 2100
      pad_mode: constant
      center: 0.0071353912353515625
      scale: 0.4630746279993888
      min: -5
      max: 5
      pad_value: 0
    track_charge:
      length: 2100
      pad_mode: constant
      center: 1.0
      scale: 0.5
      min: -5
      max: 5
      pad_value: 0
    track_dxy_significance:
      length: 2100
      pad_mode: constant
      center: 0.0014317058958113194
      scale: 0.7949812517690341
      min: -5
      max: 5
      pad_value: 0
    track_log_dz_significance:
      length: 2100
      pad_mode: constant
      center: -0.03824715316295624
      scale: 0.1644520043601814
      min: -5
      max: 5
      pad_value: 0
    track_log_norm_chi2:
      length: 2100
      pad_mode: constant
      center: 0.0
      scale: 1.442695036924675
      min: -5
      max: 5
      pad_value: 0
    track_log_pt_error:
      length: 2100
      pad_mode: constant
      center: -4.272049427032471
      scale: 1.1910611574378422
      min: -5
      max: 5
      pad_value: 0
    track_n_valid_pixel_hits:
      length: 2100
      pad_mode: constant
      center: 4.0
      scale: 1.0
      min: -5
      max: 5
      pad_value: 0
    track_dca_significance:
      length: 2100
      pad_mode: constant
      center: 0.7576620578765869
      scale: 0.5694130596837123
      min: -5
      max: 5
      pad_value: 0
    track_log_covariance_phi_phi:
      length: 2100
      pad_mode: constant
      center: -11.352328300476074
      scale: 0.7226724191402992
      min: -5
      max: 5
      pad_value: 0
    track_log_covariance_lambda_lambda:
      length: 2100
      pad_mode: constant
      center: -13.105502128601074
      scale: 0.6764465294389352
      min: -5
      max: 5
      pad_value: 0
    track_log_pt:
      length: 2100
      pad_mode: constant
      center: -0.23505373299121857
      scale: 1.707486200639462
      min: -5
      max: 5
      pad_value: 0
    track_log_relative_pt_error:
      length: 2100
      pad_mode: constant
      center: -4.127867221832275
      scale: 1.6998867634864525
      min: -5
      max: 5
      pad_value: 0
    track_px_raw:
      length: 2100
      pad_mode: constant
      center: null
      scale: 1
      min: -5
      max: 5
      pad_value: 0
    track_py_raw:
      length: 2100
      pad_mode: constant
      center: null
      scale: 1
      min: -5
      max: 5
      pad_value: 0
    track_pz_raw:
      length: 2100
      pad_mode: constant
      center: null
      scale: 1
      min: -5
      max: 5
      pad_value: 0
    track_energy:
      length: 2100
      pad_mode: constant
      center: null
      scale: 1
      min: -5
      max: 5
      pad_value: 0
    track_mask:
      length: 2100
      pad_mode: constant
      center: null
      scale: 1
      min: -5
      max: 5
      pad_value: 0
    track_label_from_tau:
      length: 2100
      pad_mode: constant
      center: null
      scale: 1
      min: -5
      max: 5
      pad_value: 0
new_variables:
  track_mask: ak.ones_like(track_eta)
  track_px: track_pt * np.cos(track_phi)
  track_py: track_pt * np.sin(track_phi)
  track_pz: track_pt * np.sinh(track_eta)
  track_energy: np.sqrt(track_px**2 + track_py**2 + track_pz**2 + 0.13957**2)
  track_log_dz_significance: np.sign(track_dz_significance) * np.log1p(np.abs(track_dz_significance))
  track_log_norm_chi2: np.log1p(track_norm_chi2)
  track_log_pt_error: np.log(np.maximum(track_pt_error, 1e-12))
  track_log_covariance_phi_phi: np.log(np.maximum(track_covariance_phi_phi, 1e-12))
  track_log_covariance_lambda_lambda: np.log(np.maximum(track_covariance_lambda_lambda,
    1e-12))
  track_log_pt: np.log(track_pt + 1e-6)
  track_log_relative_pt_error: np.log(np.maximum(track_pt_error / (track_pt + 1e-6),
    1e-12))
  track_eta_raw: track_eta
  track_phi_raw: track_phi
  track_px_raw: track_px
  track_py_raw: track_py
  track_pz_raw: track_pz
  dummy_label: np.ones_like(event_n_tracks, dtype='float32')
inputs:
  pf_points:
    length: 2100
    pad_mode: constant
    vars:
    - - track_eta_raw
      - null
    - - track_phi_raw
      - null
  pf_features:
    length: 2100
    pad_mode: constant
    vars:
    - track_px
    - track_py
    - track_pz
    - track_eta
    - track_phi
    - track_charge
    - track_dxy_significance
    - track_log_dz_significance
    - track_log_norm_chi2
    - track_log_pt_error
    - track_n_valid_pixel_hits
    - track_dca_significance
    - track_log_covariance_phi_phi
    - track_log_covariance_lambda_lambda
    - track_log_pt
    - track_log_relative_pt_error
  pf_vectors:
    length: 2100
    pad_mode: constant
    vars:
    - - track_px_raw
      - null
    - - track_py_raw
      - null
    - - track_pz_raw
      - null
    - - track_energy
      - null
  pf_mask:
    length: 2100
    pad_mode: constant
    vars:
    - - track_mask
      - null
  pf_label:
    length: 2100
    pad_mode: constant
    vars:
    - - track_label_from_tau
      - null
labels:
  type: simple
  value:
  - dummy_label
observers:
- event_n_tracks
- event_run
- event_id
- event_luminosity_block
- source_batch_id
- source_microbatch_id
monitor_variables: []
weights: null
